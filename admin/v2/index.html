<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solitaire · Unity Web Editor v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/styles.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="v2-topbar">
    <div class="v2-brand">
      <span class="v2-brand-mark">⚙</span>
      <div>
        <div class="v2-brand-title">Solitaire · Unity Editor</div>
        <div class="v2-brand-subtitle">Web Admin v2 · design-time asset editor</div>
      </div>
    </div>
    <div class="v2-topbar-right">
      <div id="v2-last-applied" class="v2-last-applied"></div>
      <button id="v2-refresh-btn" class="v2-secondary-btn" title="Re-fetch snapshot.json">
        ↻ Refresh
      </button>
      <button id="v2-save-btn" class="publish-btn" disabled>
        💾 全局保存 <span id="v2-save-count">(0)</span>
      </button>
    </div>
  </header>

  <main class="v2-layout">
    <aside class="v2-sidebar" id="v2-sidebar">
      <div class="v2-sidebar-empty mono">loading snapshot…</div>
    </aside>

    <section class="v2-main" id="v2-main">
      <div class="v2-main-empty mono">
        Run Unity menu:<br>
        <code>Tools/Solitaire/Content/Sync to Web Admin</code><br>
        then refresh.
      </div>
    </section>
  </main>

  <div id="v2-toast" class="v2-toast"></div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
