<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Disney Solitaire · Content Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-900 text-white">
  <header class="border-b border-white/10 px-8 py-4 flex justify-between items-center sticky top-0 bg-slate-900/95 backdrop-blur z-10">
    <div>
      <h1 class="text-xl font-semibold">Disney Solitaire · Content Admin</h1>
      <p class="text-xs text-slate-500 mono">localhost:8767 · disney-solitaire-content-poc</p>
    </div>
    <div class="flex items-center gap-4">
      <span id="status-indicator" class="text-xs text-slate-400">Loading...</span>
      <button id="publish-btn" class="publish-btn" disabled>Publish</button>
    </div>
  </header>
  <main class="grid grid-cols-[200px_1fr] min-h-[calc(100vh-65px)]">
    <aside class="border-r border-white/5 p-6">
      <nav id="collections-nav"></nav>
    </aside>
    <section id="main-panel" class="p-8 overflow-y-auto"></section>
  </main>
  <div id="toast-container" class="fixed bottom-4 right-4 w-[320px] z-50"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
