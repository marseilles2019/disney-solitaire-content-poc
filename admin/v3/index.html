<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solitaire · Unity Editor v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/styles.css">
  <link rel="stylesheet" href="/v2/styles.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="v2-topbar">
    <div class="v2-brand">
      <span class="v2-brand-mark">⚙</span>
      <div>
        <div class="v2-brand-title">Solitaire · Unity Editor</div>
        <div class="v2-brand-subtitle">v3 · Layout view</div>
      </div>
    </div>
    <div class="v2-topbar-right">
      <div id="v3-last-applied" class="v2-last-applied"></div>
      <div id="v3-watch-indicator" class="v2-last-applied" style="margin-right:8px;"></div>
      <button id="v3-settings-toggle" class="v3-settings-toggle" title="开发者工具">⚙</button>
      <button id="v3-refresh-btn" class="v2-secondary-btn" title="Re-fetch snapshot.json">↻ Refresh</button>
      <button id="v3-save-btn" class="publish-btn" disabled>💾 全局保存 <span id="v3-save-count">(0)</span></button>
    </div>
    <div id="v3-settings-host"></div>
  </header>

  <main class="v3-cascade">
    <aside class="v3-pane v3-pane-sources" id="v3-sources"></aside>
    <section class="v3-pane v3-pane-layout" id="v3-layout"></section>
    <section class="v3-pane v3-pane-list" id="v3-list"></section>
    <aside class="v3-pane v3-pane-detail" id="v3-detail"></aside>
  </main>

  <div id="v3-toast" class="v2-toast"></div>
  <div id="v3-batch-modal" class="batch-backdrop"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
